name: CI PT-BR

on: [push, pull_request]

jobs:
  test:
    name: Run tests (PT-BR)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Update rustup
        run: rustup self update

      - name: Install Rust
        run: |
          rustup set profile minimal
          rustup toolchain install stable -c rust-docs
          rustup default stable

      - name: Install mdBook
        run: cargo install mdbook

      - name: Report versions
        run: |
          rustup --version
          rustc -Vv
          mdbook --version

      - name: Build trpl crate
        run: |
          cd packages/trpl
          cargo build

      - name: Run mdBook tests (PT-BR)
        run: |
          MDBOOK_CONFIG=book-pt-br.toml mdbook test \
            --library-path packages/trpl/target/debug/deps

  lint:
    name: Run lints (PT-BR)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Update rustup
        run: rustup self update

      - name: Install Rust (nightly)
        run: |
          rustup set profile minimal
          rustup toolchain install nightly -c rust-docs
          rustup override set nightly

      - name: Install mdBook
        run: cargo install mdbook

      - name: Install aspell
        run: sudo apt-get update && sudo apt-get install -y aspell

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Report versions
        run: |
          rustup --version
          rustc -Vv
          mdbook --version
          aspell --version
          shellcheck --version

      - name: Shellcheck
        run: find . -name '*.sh' -print0 | xargs -0 shellcheck

      - name: Spellcheck (PT-BR)
        run: bash ci/spellcheck.sh list

      - name: Lint for local file paths (PT-BR)
        run: |
          MDBOOK_CONFIG=book-pt-br.toml mdbook build
          cargo run --bin lfp src-pt-br

      - name: Validate references
        run: bash ci/validate.sh

      - name: Check for broken links (PT-BR)
        run: |
          curl -sSLo linkcheck.sh \
            https://raw.githubusercontent.com/rust-lang/rust/HEAD/src/tools/linkchecker/linkcheck.sh
          sh linkcheck.sh book-pt-br

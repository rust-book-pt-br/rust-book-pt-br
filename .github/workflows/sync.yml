name: Sync upstream

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Add upstream
        run: git remote add upstream https://github.com/rust-lang/book.git || true

      - name: Fetch all history
        run: |
          git fetch origin
          git fetch upstream

      - name: Merge upstream
        run: git merge upstream/main --no-edit

      - name: Push
        run: git push origin HEAD:main
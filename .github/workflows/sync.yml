name: Sync upstream

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: git remote add upstream https://github.com/rust-lang/book.git || true

      - run: |
          git fetch upstream
          git merge upstream/main --no-edit

      - run: git push origin main

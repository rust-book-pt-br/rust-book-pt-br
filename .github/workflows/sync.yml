name: Sync upstream

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Add upstream
        run: git remote add upstream https://github.com/rust-lang/book.git || true

      - name: Fetch upstream
        run: git fetch upstream

      - name: Create branch
        run: |
          git checkout -b sync-upstream || git checkout sync-upstream

      - name: Merge upstream
        run: git merge upstream/main --no-edit

      - name: Push branch
        run: git push origin sync-upstream --force
